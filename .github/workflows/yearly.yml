name: Yearly Review
on:
  schedule:
    - cron: "0 4 1 1 *"
  workflow_dispatch:
permissions:
  contents: write
jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20" }
      - name: Generate yearly review
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: node generate-yearly.mjs
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add summary-yearly.json
          if git diff --staged --quiet; then echo "No changes"; else git commit -m "Yearly review" && git push; fi
