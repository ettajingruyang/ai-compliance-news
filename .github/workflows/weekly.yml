name: Weekly Summary

on:
  schedule:
    # 每周一 北京时间 8:00 (UTC 0:00)
    - cron: "0 0 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Generate weekly summary
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: node generate-weekly.mjs
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add summary-weekly.json
          if git diff --staged --quiet; then echo "No changes"; else git commit -m "Weekly summary" && git push; fi
